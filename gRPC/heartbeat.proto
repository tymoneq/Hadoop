syntax = "proto3";

package hadoop_grpc;

option go_package = "./pb";

service HealthService {
  rpc SendHeartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

service FileWritingMetadataService {
  rpc SendFileMetadata(FileMetadataRequest) returns (FileMetadataResponse);
}

service FileSendingService {
  rpc SendChunk(stream ChunkData) returns (TransferStatus);
}

message HeartbeatRequest {
  string worker_id = 1;
  string ip = 2;
  int64 timestamp = 3;
  NodeResources resources = 4;
}

message HeartbeatResponse {
  bool acknowledge = 1;
}

message NodeResources {
  int64 total_storage = 1;
  int64 used_storage = 2;
  int64 free_storage = 3;
}

message FileMetadataRequest {
  int64 total_size = 1;
  string file_name = 2;
}

message FileMetadataResponse {
  bool status = 1;
  repeated NodesID nodes = 2;
}

message NodesID {
  string node_id = 1;
  string node_ip = 2;
}

message ChunkData {
  string chunk_id = 1;
  bytes data = 2;
  bool is_last = 3;
}

message TransferStatus {
  bool success = 1;
  string message = 2;
}
